{% extends "base.html" %}
{% block title %}Model Registry — Neuro{% endblock %}

{% block body %}
<div class="flex h-screen bg-canvas overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-[220px] flex-shrink-0 bg-surface border-r border-border flex flex-col select-none">
    <div class="px-4 py-4 border-b border-border">
      <div class="flex items-center gap-2.5">
        <svg class="w-6 h-6 flex-shrink-0" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="6" fill="#6366f1" fill-opacity="0.12"/>
          <circle cx="14" cy="14" r="4.5" stroke="#6366f1" stroke-width="1.6" fill="none"/>
          <circle cx="14" cy="14" r="1.8" fill="#6366f1"/>
          <line x1="14" y1="2" x2="14" y2="8" stroke="#6366f1" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14" y1="20" x2="14" y2="26" stroke="#6366f1" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="14" x2="8" y2="14" stroke="#6366f1" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="20" y1="14" x2="26" y2="14" stroke="#6366f1" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <div>
          <span class="text-white font-semibold text-sm tracking-tight">neuro</span>
          <span class="ml-1.5 text-[10px] font-mono text-faint bg-elevated border border-border px-1.5 py-0.5 rounded">v2.3</span>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
      <p class="px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">Training</p>
      <a href="/dashboard" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-elevated text-muted hover:text-gray-200 text-sm transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 13a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg>
        Overview
      </a>
      <a href="/runs" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-elevated text-muted hover:text-gray-200 text-sm transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Runs
      </a>
      <a href="/models" class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-accent-muted text-white text-sm font-medium">
        <svg class="w-4 h-4 text-indigo-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
        Models
      </a>
      <a href="/datasets" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-elevated text-muted hover:text-gray-200 text-sm transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>
        Datasets
      </a>
      <div class="border-t border-border my-2 mx-1"></div>
      <p class="px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">Storage</p>
      <a href="/artifacts" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-elevated text-muted hover:text-gray-200 text-sm transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
        Artifacts
      </a>
      <div class="border-t border-border my-2 mx-1"></div>
      <p class="px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">System</p>
      <a href="/admin" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-elevated text-muted hover:text-gray-200 text-sm transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Admin
      </a>
    </nav>
    <div class="p-3 border-t border-border">
      <button class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg hover:bg-elevated transition-colors text-left">
        <div class="w-7 h-7 rounded-lg bg-indigo-500/30 border border-indigo-500/40 flex items-center justify-center text-xs font-bold text-indigo-300 flex-shrink-0">MC</div>
        <div class="min-w-0 flex-1">
          <p class="text-xs font-semibold text-gray-200 truncate">Ming Chen</p>
          <p class="text-[10px] text-faint truncate">m.chen@neuro.ai</p>
        </div>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header class="bg-surface border-b border-border px-6 py-3.5 flex items-center justify-between flex-shrink-0">
      <div>
        <h2 class="text-sm font-semibold text-white">Model Registry</h2>
        <p class="text-[11px] text-faint font-mono">s3://neuro-ml-artifacts/models/</p>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
      <div class="grid grid-cols-1 gap-4" id="models-grid"></div>
    </main>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var MODELS = [
    {id:'llama3-8b-finetune', name:'llama3-8b-finetune', version:'v1.2.3', status:'deployed',
     s3:'s3://neuro-ml-artifacts/models/llama3-8b/', created:'2026-05-01', owner:'priya.nair',
     params:'8B', framework:'PyTorch 2.2'},
    {id:'mistral-7b-rlhf', name:'mistral-7b-rlhf', version:'v2.0.1', status:'training',
     s3:'s3://neuro-ml-artifacts/models/mistral-7b/', created:'2026-04-28', owner:'m.chen',
     params:'7B', framework:'PyTorch 2.2'},
    {id:'phi-3-mini', name:'phi-3-mini-finetuned', version:'v1.0.0', status:'pending',
     s3:'s3://neuro-ml-artifacts/models/phi-3-mini/', created:'2026-04-15', owner:'svc-deploy',
     params:'3.8B', framework:'PyTorch 2.2'},
    {id:'gpt4-cls', name:'gpt4-classifier', version:'v3.1.0', status:'deployed',
     s3:'s3://neuro-ml-artifacts/models/gpt4-cls/', created:'2026-03-10', owner:'m.chen',
     params:'1.5B', framework:'PyTorch 2.1'},
  ];

  var STATUS_STYLE = {
    deployed: 'background:#22c55e20;color:#86efac;border:1px solid #22c55e40',
    training: 'background:#06C0D820;color:#06C0D8;border:1px solid #06C0D840',
    pending:  'background:#f59e0b20;color:#fcd34d;border:1px solid #f59e0b40',
    failed:   'background:#ef444420;color:#fca5a5;border:1px solid #ef444440',
  };

  var grid = document.getElementById('models-grid');
  MODELS.forEach(function(m) {
    var div = document.createElement('div');
    div.className = 'bg-surface border border-border rounded-xl p-5 shadow-card';
    div.innerHTML =
      '<div class="flex items-start justify-between mb-3">' +
        '<div>' +
          '<p class="text-sm font-semibold text-white">' + m.name + '</p>' +
          '<p class="text-[11px] text-faint font-mono mt-0.5">' + m.version + ' &middot; ' + m.params + ' &middot; ' + m.framework + '</p>' +
        '</div>' +
        '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full" style="' + (STATUS_STYLE[m.status]||'') + '">' + m.status + '</span>' +
      '</div>' +
      '<p class="text-[11px] text-faint font-mono truncate mb-3">' + m.s3 + '</p>' +
      '<div class="flex items-center justify-between text-[11px] text-faint">' +
        '<span>Owner: <span class="text-gray-300">' + m.owner + '</span></span>' +
        '<span>Created: <span class="text-gray-300">' + m.created + '</span></span>' +
      '</div>';
    grid.appendChild(div);
  });

  fetch('/api/v1/telemetry', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: 'page_view', page: 'models', ts: Date.now()})
  }).catch(function(){});
})();
</script>
{% endblock %}
