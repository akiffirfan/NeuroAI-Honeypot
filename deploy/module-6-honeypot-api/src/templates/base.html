<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Neuro — AI Training Infrastructure">
  <meta name="theme-color" content="#0a0b0f">
  <title>{% block title %}Neuro — AI Training Platform{% endblock %}</title>

  <!-- Favicon (inline SVG data URI so no extra request) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0b0f'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%236366f1' stroke-width='1.8'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%236366f1'/%3E%3Cline x1='16' y1='3' x2='16' y2='9' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='23' x2='16' y2='29' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='3' y1='16' x2='9' y2='16' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='23' y1='16' x2='29' y2='16' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- Inter via Google Fonts — matches W&B / Modal visual register -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── CSS custom properties (brand palette) ──────────────────────────── */
    :root {
      --c-canvas:       #0a0b0f;
      --c-surface:      #111318;
      --c-elevated:     #181b22;
      --c-overlay:      #1e2130;
      --c-border:       #272b3a;
      --c-accent:       #6366f1;
      --c-accent-dim:   #4f52cc;
      --c-accent-muted: rgba(99,102,241,0.15);
      --c-muted:        #6b7280;
      --c-faint:        #3d4258;
      --c-success:      #22c55e;
      --c-warn:         #f59e0b;
      --c-danger:       #ef4444;
      --c-info:         #3b82f6;
      --c-violet:       #a78bfa;
      --shadow-card:    0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* ── Reset / base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { line-height: 1.5; -webkit-text-size-adjust: 100%; tab-size: 4; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    a { color: inherit; text-decoration: inherit; }
    button, input, select, textarea { font-family: inherit; font-size: 100%; margin: 0; }
    button { cursor: pointer; background: transparent; border: 0; padding: 0; }
    table { border-collapse: collapse; }
    th { font-weight: inherit; text-align: inherit; }
    code { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    canvas, img, svg { display: block; max-width: 100%; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .flex        { display: flex; }
    .inline-flex { display: inline-flex; }
    .grid        { display: grid; }
    .block       { display: block; }
    .inline-block{ display: inline-block; }
    .hidden      { display: none !important; }

    .flex-1      { flex: 1 1 0%; }
    .flex-col    { flex-direction: column; }
    .flex-wrap   { flex-wrap: wrap; }
    .flex-shrink-0 { flex-shrink: 0; }
    .items-center { align-items: center; }
    .items-start  { align-items: flex-start; }
    .justify-center  { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .col-span-2  { grid-column: span 2 / span 2; }
    .grid-cols-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-cols-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

    .relative    { position: relative; }
    .absolute    { position: absolute; }
    .fixed       { position: fixed; }
    .sticky      { position: sticky; }
    .top-0       { top: 0; }
    .top-1       { top: 0.25rem; }
    .top-\[-10\%\] { top: -10%; }
    .top-\[-8\%\]  { top: -8%; }
    .top-1\/2    { top: 50%; }
    .bottom-\[-5\%\] { bottom: -5%; }
    .bottom-\[5\%\]  { bottom: 5%; }
    .left-0      { left: 0; }
    .left-8      { left: 2rem; }
    .left-\[-5\%\]  { left: -5%; }
    .left-\[5\%\]   { left: 5%; }
    .right-0     { right: 0; }
    .right-1     { right: 0.25rem; }
    .right-3     { right: 0.75rem; }
    .right-8     { right: 2rem; }
    .right-\[5\%\]  { right: 5%; }
    .right-\[10\%\] { right: 10%; }
    .z-10        { z-index: 10; }
    .z-30        { z-index: 30; }

    .overflow-hidden  { overflow: hidden; }
    .overflow-x-auto  { overflow-x: auto; }
    .overflow-y-auto  { overflow-y: auto; }
    .min-w-0          { min-width: 0; }
    .min-h-screen     { min-height: 100vh; }
    .h-screen         { height: 100vh; }
    .h-full           { height: 100%; }
    .h-px             { height: 1px; }
    .h-0\.5           { height: 0.125rem; }
    .h-1\.5           { height: 0.375rem; }
    .h-3\.5           { height: 0.875rem; }
    .h-4              { height: 1rem; }
    .h-5              { height: 1.25rem; }
    .h-6              { height: 1.5rem; }
    .h-7              { height: 1.75rem; }
    .h-8              { height: 2rem; }
    .h-14             { height: 3.5rem; }
    .h-64             { height: 16rem; }
    .h-80             { height: 20rem; }
    .h-96             { height: 24rem; }
    .w-px             { width: 1px; }
    .w-1\.5           { width: 0.375rem; }
    .w-2              { width: 0.5rem; }
    .w-3\.5           { width: 0.875rem; }
    .w-4              { width: 1rem; }
    .w-5              { width: 1.25rem; }
    .w-6              { width: 1.5rem; }
    .w-7              { width: 1.75rem; }
    .w-8              { width: 2rem; }
    .w-14             { width: 3.5rem; }
    .w-20             { width: 5rem; }
    .w-64             { width: 16rem; }
    .w-80             { width: 20rem; }
    .w-96             { width: 24rem; }
    .w-full           { width: 100%; }
    .w-\[220px\]      { width: 220px; }
    .max-w-5xl        { max-width: 64rem; }
    .max-w-\[380px\]  { max-width: 380px; }
    .max-w-\[400px\]  { max-width: 400px; }

    /* ── Spacing ─────────────────────────────────────────────────────────── */
    .p-2\.5  { padding: 0.625rem; }
    .p-3     { padding: 0.75rem; }
    .p-3\.5  { padding: 0.875rem; }
    .p-4     { padding: 1rem; }
    .p-5     { padding: 1.25rem; }
    .p-6     { padding: 1.5rem; }
    .p-7     { padding: 1.75rem; }
    .px-1    { padding-left: 0.25rem;  padding-right: 0.25rem; }
    .px-1\.5 { padding-left: 0.375rem; padding-right: 0.375rem; }
    .px-2    { padding-left: 0.5rem;   padding-right: 0.5rem; }
    .px-2\.5 { padding-left: 0.625rem; padding-right: 0.625rem; }
    .px-3    { padding-left: 0.75rem;  padding-right: 0.75rem; }
    .px-3\.5 { padding-left: 0.875rem; padding-right: 0.875rem; }
    .px-4    { padding-left: 1rem;     padding-right: 1rem; }
    .px-5    { padding-left: 1.25rem;  padding-right: 1.25rem; }
    .px-6    { padding-left: 1.5rem;   padding-right: 1.5rem; }
    .px-8    { padding-left: 2rem;     padding-right: 2rem; }
    .py-0\.5 { padding-top: 0.125rem;  padding-bottom: 0.125rem; }
    .py-1    { padding-top: 0.25rem;   padding-bottom: 0.25rem; }
    .py-1\.5 { padding-top: 0.375rem;  padding-bottom: 0.375rem; }
    .py-2    { padding-top: 0.5rem;    padding-bottom: 0.5rem; }
    .py-2\.5 { padding-top: 0.625rem;  padding-bottom: 0.625rem; }
    .py-3    { padding-top: 0.75rem;   padding-bottom: 0.75rem; }
    .py-3\.5 { padding-top: 0.875rem;  padding-bottom: 0.875rem; }
    .py-4    { padding-top: 1rem;      padding-bottom: 1rem; }
    .py-5    { padding-top: 1.25rem;   padding-bottom: 1.25rem; }
    .py-8    { padding-top: 2rem;      padding-bottom: 2rem; }
    .pt-0\.5 { padding-top: 0.125rem; }
    .pt-4    { padding-top: 1rem; }
    .pr-1    { padding-right: 0.25rem; }
    .pr-10   { padding-right: 2.5rem; }
    .mb-1\.5 { margin-bottom: 0.375rem; }
    .mb-3    { margin-bottom: 0.75rem; }
    .mb-4    { margin-bottom: 1rem; }
    .mb-5    { margin-bottom: 1.25rem; }
    .mb-6    { margin-bottom: 1.5rem; }
    .mb-7    { margin-bottom: 1.75rem; }
    .mb-8    { margin-bottom: 2rem; }
    .mt-0\.5 { margin-top: 0.125rem; }
    .mt-1    { margin-top: 0.25rem; }
    .mt-1\.5 { margin-top: 0.375rem; }
    .mt-2    { margin-top: 0.5rem; }
    .mt-3    { margin-top: 0.75rem; }
    .mt-5    { margin-top: 1.25rem; }
    .mt-8    { margin-top: 2rem; }
    .ml-1    { margin-left: 0.25rem; }
    .ml-1\.5 { margin-left: 0.375rem; }
    .ml-2    { margin-left: 0.5rem; }
    .ml-auto { margin-left: auto; }
    .mx-1    { margin-left: 0.25rem; margin-right: 0.25rem; }
    .mx-auto { margin-left: auto;   margin-right: auto; }
    .my-2    { margin-top: 0.5rem;  margin-bottom: 0.5rem; }
    .my-5    { margin-top: 1.25rem; margin-bottom: 1.25rem; }

    .gap-1   { gap: 0.25rem; }
    .gap-1\.5{ gap: 0.375rem; }
    .gap-2   { gap: 0.5rem; }
    .gap-2\.5{ gap: 0.625rem; }
    .gap-3   { gap: 0.75rem; }
    .gap-4   { gap: 1rem; }

    .space-y-0\.5 > * + * { margin-top: 0.125rem; }
    .space-y-1    > * + * { margin-top: 0.25rem; }
    .space-y-1\.5 > * + * { margin-top: 0.375rem; }
    .space-y-2    > * + * { margin-top: 0.5rem; }
    .space-y-2\.5 > * + * { margin-top: 0.625rem; }
    .space-y-3    > * + * { margin-top: 0.75rem; }
    .space-y-4    > * + * { margin-top: 1rem; }
    .space-y-5    > * + * { margin-top: 1.25rem; }

    .divide-y > * + *          { border-top: 1px solid; }
    .divide-border\/50 > * + * { border-color: rgba(39,43,58,0.5); }

    /* ── Typography ──────────────────────────────────────────────────────── */
    .font-sans     { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .font-mono     { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .font-light    { font-weight: 300; }
    .font-medium   { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold     { font-weight: 700; }
    .text-\[10px\] { font-size: 10px; line-height: 1.4; }
    .text-\[11px\] { font-size: 11px; line-height: 1.4; }
    .text-xs       { font-size: 0.75rem;  line-height: 1rem; }
    .text-sm       { font-size: 0.875rem; line-height: 1.25rem; }
    .text-base     { font-size: 1rem;     line-height: 1.5rem; }
    .text-xl       { font-size: 1.25rem;  line-height: 1.75rem; }
    .text-2xl      { font-size: 1.5rem;   line-height: 2rem; }
    .tracking-tight   { letter-spacing: -0.025em; }
    .tracking-wider   { letter-spacing: 0.05em; }
    .tracking-widest  { letter-spacing: 0.1em; }
    .uppercase     { text-transform: uppercase; }
    .italic        { font-style: italic; }
    .text-left     { text-align: left; }
    .text-center   { text-align: center; }
    .text-right    { text-align: right; }
    .leading-relaxed { line-height: 1.625; }
    .truncate      { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .select-none   { user-select: none; }
    .antialiased   { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .underline         { text-decoration: underline; }
    .underline-offset-2{ text-underline-offset: 2px; }

    /* ── Colors — text ───────────────────────────────────────────────────── */
    .text-white        { color: #ffffff; }
    .text-gray-100     { color: #f3f4f6; }
    .text-gray-200     { color: #e5e7eb; }
    .text-gray-300     { color: #d1d5db; }
    .text-gray-400     { color: #9ca3af; }
    .text-canvas       { color: var(--c-canvas); }
    .text-accent       { color: var(--c-accent); }
    .text-muted        { color: var(--c-muted); }
    .text-faint        { color: var(--c-faint); }
    .text-faint\/40    { color: rgba(61,66,88,0.4); }
    .text-faint\/50    { color: rgba(61,66,88,0.5); }
    .text-border       { color: var(--c-border); }
    .text-success      { color: var(--c-success); }
    .text-warn         { color: var(--c-warn); }
    .text-danger       { color: var(--c-danger); }
    .text-info         { color: var(--c-info); }
    .text-indigo-300   { color: #a5b4fc; }
    .text-indigo-400   { color: #818cf8; }
    .text-violet-400   { color: #a78bfa; }
    .text-blue-400     { color: #60a5fa; }
    .text-red-200      { color: #fecaca; }
    .text-red-300      { color: #fca5a5; }
    .text-red-400      { color: #f87171; }
    .text-yellow-100   { color: #fef9c3; }
    .text-yellow-200   { color: #fef08a; }
    .text-yellow-300   { color: #fde047; }
    .text-yellow-300\/80 { color: rgba(253,224,71,0.8); }

    /* ── Colors — backgrounds ────────────────────────────────────────────── */
    .bg-canvas         { background-color: var(--c-canvas); }
    .bg-surface        { background-color: var(--c-surface); }
    .bg-surface\/95    { background-color: rgba(17,19,24,0.95); }
    .bg-elevated       { background-color: var(--c-elevated); }
    .bg-elevated\/20   { background-color: rgba(24,27,34,0.2); }
    .bg-elevated\/40   { background-color: rgba(24,27,34,0.4); }
    .bg-elevated\/50   { background-color: rgba(24,27,34,0.5); }
    .bg-overlay        { background-color: var(--c-overlay); }
    .bg-border         { background-color: var(--c-border); }
    .bg-accent         { background-color: var(--c-accent); }
    .bg-accent-muted   { background-color: var(--c-accent-muted); }
    .bg-muted          { background-color: var(--c-muted); }
    .bg-faint          { background-color: var(--c-faint); }
    .bg-success        { background-color: var(--c-success); }
    .bg-success\/10    { background-color: rgba(34,197,94,0.10); }
    .bg-success\/15    { background-color: rgba(34,197,94,0.15); }
    .bg-success\/50    { background-color: rgba(34,197,94,0.50); }
    .bg-warn           { background-color: var(--c-warn); }
    .bg-warn\/8        { background-color: rgba(245,158,11,0.08); }
    .bg-warn\/60       { background-color: rgba(245,158,11,0.60); }
    .bg-danger         { background-color: var(--c-danger); }
    .bg-danger\/8      { background-color: rgba(239,68,68,0.08); }
    .bg-danger\/60     { background-color: rgba(239,68,68,0.60); }
    .bg-danger\/80     { background-color: rgba(239,68,68,0.80); }
    .bg-info           { background-color: var(--c-info); }
    .bg-indigo-400     { background-color: #818cf8; }
    .bg-indigo-500     { background-color: #6366f1; }
    .bg-indigo-500\/10 { background-color: rgba(99,102,241,0.10); }
    .bg-indigo-500\/20 { background-color: rgba(99,102,241,0.20); }
    .bg-indigo-500\/30 { background-color: rgba(99,102,241,0.30); }
    .bg-indigo-600\/20 { background-color: rgba(99,102,241,0.20); }
    .bg-indigo-700\/10 { background-color: rgba(99,102,241,0.10); }
    .bg-amber-400      { background-color: #fbbf24; }
    .bg-blue-500\/10   { background-color: rgba(59,130,246,0.10); }
    .bg-violet-500\/10 { background-color: rgba(167,139,250,0.10); }
    .bg-violet-700\/10 { background-color: rgba(124,58,237,0.10); }
    .bg-red-800\/15    { background-color: rgba(153,27,27,0.15); }
    .bg-gradient-to-r  { background-image: linear-gradient(to right, var(--tw-gradient-from, transparent), var(--tw-gradient-to, transparent)); }
    .from-transparent  { --tw-gradient-from: transparent; }
    .from-indigo-500   { --tw-gradient-from: #6366f1; }
    .via-indigo-500\/40{ --tw-gradient-stops: var(--tw-gradient-from), rgba(99,102,241,0.4), var(--tw-gradient-to); background-image: linear-gradient(to right, var(--tw-gradient-from), rgba(99,102,241,0.4), var(--tw-gradient-to)); }
    .via-red-500\/40   { --tw-gradient-stops: var(--tw-gradient-from), rgba(239,68,68,0.4), var(--tw-gradient-to); background-image: linear-gradient(to right, var(--tw-gradient-from), rgba(239,68,68,0.4), var(--tw-gradient-to)); }
    .to-transparent    { --tw-gradient-to: transparent; }
    .to-violet-500     { --tw-gradient-to: #8b5cf6; }

    /* ── Gradient bars (used inline with from/via/to) ─────────────────────── */
    .bg-gradient-to-r.from-indigo-500.to-violet-500 {
      background-image: linear-gradient(to right, #6366f1, #8b5cf6);
    }

    /* ── Borders ─────────────────────────────────────────────────────────── */
    .border          { border-width: 1px; border-style: solid; }
    .border-t        { border-top: 1px solid; }
    .border-b        { border-bottom: 1px solid; }
    .border-r        { border-right: 1px solid; }
    .border-border   { border-color: var(--c-border); }
    .border-danger\/20 { border-color: rgba(239,68,68,0.20); }
    .border-warn\/20   { border-color: rgba(245,158,11,0.20); }
    .border-warn\/25   { border-color: rgba(245,158,11,0.25); }
    .border-indigo-500\/30 { border-color: rgba(99,102,241,0.30); }
    .border-indigo-500\/40 { border-color: rgba(99,102,241,0.40); }

    /* ── Border radius ────────────────────────────────────────────────────── */
    .rounded        { border-radius: 0.25rem; }
    .rounded-md     { border-radius: 0.375rem; }
    .rounded-lg     { border-radius: 0.5rem; }
    .rounded-xl     { border-radius: 0.75rem; }
    .rounded-2xl    { border-radius: 1rem; }
    .rounded-full   { border-radius: 9999px; }

    /* ── Shadows ─────────────────────────────────────────────────────────── */
    .shadow-card { box-shadow: var(--shadow-card); }

    /* ── Opacity ─────────────────────────────────────────────────────────── */
    .opacity-25  { opacity: 0.25; }
    .opacity-75  { opacity: 0.75; }

    /* ── Cursors / pointer events ─────────────────────────────────────────── */
    .cursor-pointer   { cursor: pointer; }
    .pointer-events-none { pointer-events: none; }

    /* ── Transitions ─────────────────────────────────────────────────────── */
    .transition-all    { transition: all 150ms ease; }
    .transition-colors { transition: color 150ms ease, background-color 150ms ease, border-color 150ms ease; }
    .transition-opacity{ transition: opacity 150ms ease; }
    .duration-150      { transition-duration: 150ms; }
    .duration-700      { transition-duration: 700ms; }

    /* ── Transforms ──────────────────────────────────────────────────────── */
    .-translate-y-1\/2 { transform: translateY(-50%); }
    .active\:scale-\[0\.99\]:active { transform: scale(0.99); }

    /* ── Backdrop ────────────────────────────────────────────────────────── */
    .backdrop-blur-sm { backdrop-filter: blur(4px); }

    /* ── Focus / ring ─────────────────────────────────────────────────────── */
    .focus\:outline-none:focus       { outline: none; }
    .focus\:ring-2:focus             { box-shadow: 0 0 0 2px var(--tw-ring-color, rgba(99,102,241,0.20)); }
    .focus\:ring-indigo-500\/20:focus{ --tw-ring-color: rgba(99,102,241,0.20); box-shadow: 0 0 0 2px rgba(99,102,241,0.20); }
    .focus\:border-accent:focus      { border-color: var(--c-accent); }
    .focus-visible\:ring-2:focus-visible { box-shadow: 0 0 0 2px var(--tw-ring-color, rgba(99,102,241,0.25)); }
    .focus-visible\:ring-indigo-500\/50:focus-visible { box-shadow: 0 0 0 2px rgba(99,102,241,0.50); }
    .focus-visible\:ring-red-500\/40:focus-visible    { box-shadow: 0 0 0 2px rgba(239,68,68,0.40); }

    /* ── Hover states ────────────────────────────────────────────────────── */
    .hover\:bg-accent-dim:hover   { background-color: var(--c-accent-dim); }
    .hover\:bg-danger:hover       { background-color: var(--c-danger); }
    .hover\:bg-danger\/10:hover   { background-color: rgba(239,68,68,0.10); }
    .hover\:bg-elevated:hover     { background-color: var(--c-elevated); }
    .hover\:bg-overlay:hover      { background-color: var(--c-overlay); }
    .hover\:border-faint:hover    { border-color: var(--c-faint); }
    .hover\:opacity-80:hover      { opacity: 0.8; }
    .hover\:text-danger:hover     { color: var(--c-danger); }
    .hover\:text-gray-200:hover   { color: #e5e7eb; }
    .hover\:text-gray-300:hover   { color: #d1d5db; }
    .hover\:text-indigo-300:hover { color: #a5b4fc; }
    .hover\:text-muted:hover      { color: var(--c-muted); }
    .hover\:text-white:hover      { color: #ffffff; }

    /* ── Group hover ─────────────────────────────────────────────────────── */
    .group:hover .group-hover\:text-muted  { color: var(--c-muted); }
    .group:hover .group-hover\:bg-overlay  { background-color: var(--c-overlay); }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse-dot 2s ease-in-out infinite; }

    /* ── Numeric variant ─────────────────────────────────────────────────── */
    .num { font-variant-numeric: tabular-nums; }

    /* ── Placeholder color ───────────────────────────────────────────────── */
    .placeholder-faint::placeholder { color: var(--c-faint); }

    /* ── Scrollbar — dark theme ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #272b3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d4258; }

    /* ── Focus ring override ─────────────────────────────────────────────── */
    *:focus-visible { outline: 2px solid rgba(99,102,241,0.6); outline-offset: 2px; }
    *:focus { outline: none; }

    /* ── Subtle grid texture on canvas background ────────────────────────── */
    .bg-grid {
      background-color: #0a0b0f;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Gradient glow behind login card ─────────────────────────────────── */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Table row hover ─────────────────────────────────────────────────── */
    .data-row:hover td { background: rgba(30,33,48,0.6); }

    /* ── Modal overlay ───────────────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(10,11,15,0.85); backdrop-filter: blur(4px); }
    .modal-panel { position: relative; z-index: 1; }

    /* ── Dropdown popup ──────────────────────────────────────────────────── */
    .dropdown-panel { position: absolute; z-index: 40; min-width: 200px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 0.75rem; box-shadow: 0 8px 32px rgba(0,0,0,0.6); padding: 0.5rem; }
    .dropdown-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.8125rem; color: var(--c-muted); cursor: pointer; transition: all 0.1s; width: 100%; text-align: left; }
    .dropdown-item:hover { background: var(--c-elevated); color: #e5e7eb; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; background: var(--c-elevated); border: 1px solid var(--c-border); border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.8125rem; color: #d1d5db; box-shadow: 0 4px 16px rgba(0,0,0,0.5); transition: opacity 0.3s, transform 0.3s; transform: translateY(0); opacity: 1; }
    .toast.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

    /* ── Filter buttons ──────────────────────────────────────────────────── */
    .filter-btn { font-size: 0.75rem; padding: 0.375rem 0.875rem; border-radius: 0.5rem; border: 1px solid var(--c-border); color: var(--c-muted); background: var(--c-elevated); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: var(--c-overlay); color: #e5e7eb; }
    .filter-btn.active { background: var(--c-accent-muted); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }

    /* ── Sidebar nav item ────────────────────────────────────────────────── */
    .nav-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; color: var(--c-muted); cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--c-elevated); color: #e5e7eb; }
    .nav-item.active { background: var(--c-accent-muted); color: #ffffff; }

    /* ── Status badges ───────────────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 0.375rem; font-size: 0.6875rem; font-weight: 600; padding: 0.2rem 0.625rem; border-radius: 9999px; }
    .badge-running   { color: #7dd3fc; background: rgba(56,189,248,0.1);  border: 1px solid rgba(56,189,248,0.2); }
    .badge-completed { color: #86efac; background: rgba(34,197,94,0.1);   border: 1px solid rgba(34,197,94,0.2); }
    .badge-failed    { color: #fca5a5; background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.2); }
    .badge-queued    { color: #fcd34d; background: rgba(245,158,11,0.1);  border: 1px solid rgba(245,158,11,0.2); }
    .badge-deployed  { color: #86efac; background: rgba(34,197,94,0.1);   border: 1px solid rgba(34,197,94,0.2); }
    .badge-archived  { color: var(--c-muted); background: var(--c-elevated); border: 1px solid var(--c-border); }
    .badge-training  { color: #7dd3fc; background: rgba(56,189,248,0.1);  border: 1px solid rgba(56,189,248,0.2); }

    /* ── Classification badges ───────────────────────────────────────────── */
    .cls-restricted   { color: #fca5a5; background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 0.25rem; letter-spacing: 0.04em; }
    .cls-confidential { color: #fcd34d; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 0.25rem; letter-spacing: 0.04em; }
    .cls-internal     { color: #93c5fd; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 0.25rem; letter-spacing: 0.04em; }

    /* ── Step pipeline indicators ─────────────────────────────────────────── */
    .pipeline-steps { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
    .step-pill      { font-size: 0.65rem; padding: 0.2rem 0.625rem; border-radius: 9999px; white-space: nowrap; }
    .step-done      { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
    .step-active    { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .step-pending   { background: var(--c-elevated);     color: var(--c-muted); border: 1px solid var(--c-border); }
    .step-connector { width: 1.5rem; height: 1px; background: var(--c-border); flex-shrink: 0; }

    /* ── Live chart container ─────────────────────────────────────────────── */
    .chart-container { position: relative; background: #0a0b14; border: 1px solid var(--c-border); border-radius: 0.75rem; padding: 1rem; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="bg-canvas text-gray-200 min-h-screen font-sans antialiased">
  {% block body %}{% endblock %}
  <script src="/static/js/metrics.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
