<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Neuro AI — Training Infrastructure">
  <meta name="theme-color" content="#080A0F">
  <title>{% block title %}Neuro — AI Training Platform{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080A0F'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2306C0D8'/%3E%3Cstop offset='1' stop-color='%239B59FF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='url(%23g)' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2.2' fill='%2306C0D8'/%3E%3Cline x1='16' y1='3' x2='16' y2='9' stroke='url(%23g)' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='16' y1='23' x2='16' y2='29' stroke='url(%23g)' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='3' y1='16' x2='9' y2='16' stroke='url(%23g)' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='23' y1='16' x2='29' y2='16' stroke='url(%23g)' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">

  <style>
    :root {
      --c-canvas:       #080A0F;
      --c-surface:      #0E1018;
      --c-elevated:     #141721;
      --c-overlay:      #1C2030;
      --c-border:       #1E2235;
      --c-border-hi:    #2A2F45;
      --c-accent-cyan:  #06C0D8;
      --c-accent-pur:   #9B59FF;
      --c-accent:       #0AACCC;
      --c-accent-dim:   #0990AE;
      --c-accent-muted: rgba(6,192,216,0.12);
      --c-muted:        #6B7A99;
      --c-faint:        #323752;
      --c-success:      #22C55E;
      --c-warn:         #F59E0B;
      --c-danger:       #EF4444;
      --c-info:         #3B82F6;
      --gradient-accent: linear-gradient(135deg, #06C0D8 0%, #9B59FF 100%);
      --shadow-card:    0 1px 3px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      --shadow-glow:    0 0 40px rgba(6,192,216,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--c-canvas);
      color: #E2E8F0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; background: transparent; border: none; padding: 0; }
    input, select, textarea { font-family: inherit; font-size: inherit; }
    code, pre, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    table { border-collapse: collapse; }
    th { font-weight: 500; text-align: left; }
    img, svg { display: block; max-width: 100%; }
    .hidden { display: none !important; }

    /* ── Scrollbars ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1E2235; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #323752; }

    /* ── Focus ─── */
    *:focus { outline: none; }
    *:focus-visible { outline: 2px solid rgba(6,192,216,0.5); outline-offset: 2px; }

    /* ── Grid background ─── */
    .bg-grid {
      background-color: var(--c-canvas);
      background-image:
        linear-gradient(rgba(6,192,216,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,192,216,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    /* ── Glow orbs ─── */
    .glow-orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
    }

    /* ── Gradient accent line ─── */
    .accent-line {
      position: absolute; top: 0; left: 2rem; right: 2rem; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(6,192,216,0.35), rgba(155,89,255,0.35), transparent);
      border-radius: 99px;
    }

    /* ── Cards ─── */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      box-shadow: var(--shadow-card);
    }

    /* ── Badges ─── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 99px; letter-spacing: 0.01em;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-running   { color: #7DD3FC; background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); }
    .badge-completed { color: #86EFAC; background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2);  }
    .badge-failed    { color: #FCA5A5; background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  }
    .badge-queued    { color: #FCD34D; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .badge-deployed  { color: #86EFAC; background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2);  }
    .badge-archived  { color: var(--c-muted); background: var(--c-elevated); border: 1px solid var(--c-border); }
    .badge-training  { color: #A5B4FC; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); }

    /* ── Cls badges ─── */
    .cls-restricted   { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; color: #FCA5A5; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); }
    .cls-confidential { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; color: #FCD34D; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); }
    .cls-internal     { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; color: #93C5FD; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); }

    /* ── Status dot pulse ─── */
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulse { animation: pulse-dot 2s ease-in-out infinite; }

    /* ── Spin ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

    /* ── Filter buttons ─── */
    .filter-btn {
      font-size: 12px; font-family: 'Outfit', sans-serif; font-weight: 500;
      padding: 5px 14px; border-radius: 8px;
      border: 1px solid var(--c-border); color: var(--c-muted);
      background: var(--c-elevated); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { background: var(--c-overlay); color: #E2E8F0; border-color: var(--c-border-hi); }
    .filter-btn.active { background: rgba(6,192,216,0.1); border-color: rgba(6,192,216,0.3); color: #06C0D8; }

    /* ── Nav items ─── */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 9px;
      font-size: 13.5px; font-weight: 400; color: var(--c-muted);
      cursor: pointer; transition: all 0.12s; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--c-elevated); color: #E2E8F0; }
    .nav-item.active { background: linear-gradient(135deg, rgba(6,192,216,0.12), rgba(155,89,255,0.12)); color: #ffffff; border: 1px solid rgba(6,192,216,0.15); }

    /* ── Table rows ─── */
    .data-row:hover td { background: rgba(20,23,33,0.8); }

    /* ── Toast ─── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      background: var(--c-elevated); border: 1px solid var(--c-border-hi);
      border-radius: 12px; padding: 12px 18px;
      font-size: 13px; color: #CBD5E1;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: opacity 0.25s, transform 0.25s;
      transform: translateY(0); opacity: 1;
    }
    .toast.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

    /* ── Dropdown ─── */
    .dropdown-panel {
      position: absolute; z-index: 50; min-width: 200px;
      background: var(--c-surface); border: 1px solid var(--c-border-hi);
      border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      padding: 6px;
    }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 13px; color: var(--c-muted); cursor: pointer;
      transition: all 0.1s; width: 100%; text-align: left;
    }
    .dropdown-item:hover { background: var(--c-elevated); color: #E2E8F0; }

    /* ── Modal ─── */
    .modal-overlay { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(8,10,15,0.85); backdrop-filter: blur(6px); }
    .modal-panel { position: relative; z-index: 1; width: 100%; }

    /* ── Pipeline steps ─── */
    .pipeline-steps { display: flex; align-items: center; flex-wrap: wrap; gap: 0; }
    .step-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; white-space: nowrap; font-weight: 500; }
    .step-done    { background: rgba(34,197,94,0.12); color: #86EFAC; border: 1px solid rgba(34,197,94,0.2); }
    .step-active  { background: rgba(6,192,216,0.12); color: #06C0D8; border: 1px solid rgba(6,192,216,0.25); }
    .step-pending { background: var(--c-elevated); color: var(--c-muted); border: 1px solid var(--c-border); }
    .step-connector { width: 20px; height: 1px; background: var(--c-border); flex-shrink: 0; }

    /* ── Gradient btn ─── */
    .btn-gradient {
      background: linear-gradient(135deg, #06C0D8, #8B5CF6);
      color: white; border: none; border-radius: 11px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-gradient:active { transform: scale(0.99); }

    /* ── Input ─── */
    .field {
      width: 100%; background: var(--c-elevated);
      border: 1px solid var(--c-border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 14px; color: #E2E8F0;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field::placeholder { color: var(--c-faint); }
    .field:hover { border-color: var(--c-border-hi); }
    .field:focus { border-color: rgba(6,192,216,0.5); box-shadow: 0 0 0 3px rgba(6,192,216,0.08); }
    select.field { cursor: pointer; }

    /* ── Progress bar ─── */
    .progress-track { background: var(--c-elevated); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: var(--gradient-accent); }

    /* ── Sidebar label ─── */
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--c-faint); padding: 6px 10px 4px; }

    /* ── Chart container ─── */
    .chart-container {
      background: #090B12;
      border: 1px solid var(--c-border);
      border-radius: 14px;
      padding: 20px;
      position: relative;
    }

    /* ── Live tag ─── */
    .live-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      padding: 3px 8px; border-radius: 6px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: #86EFAC;
    }

    /* ── Gradient text ─── */
    .gradient-text {
      background: var(--gradient-accent);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Fade in ─── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    /* ── Logo mark ─── */
    .logo-img { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; background: #000; }
    .logo-img-lg { width: 52px; height: 52px; object-fit: contain; }
  </style>

  <script>!function(){var w=console.warn.bind(console);console.warn=function(){var a=arguments[0];if(typeof a==='string'&&(a.indexOf('tailwind')>-1||a.indexOf('cdn.')>-1))return;w.apply(console,arguments);};}();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas:         'var(--c-canvas)',
            surface:        'var(--c-surface)',
            elevated:       'var(--c-elevated)',
            overlay:        'var(--c-overlay)',
            border:         'var(--c-border)',
            'border-hi':    'var(--c-border-hi)',
            muted:          'var(--c-muted)',
            faint:          'var(--c-faint)',
            accent:         'var(--c-accent)',
            'accent-muted': 'var(--c-accent-muted)',
            success:        'var(--c-success)',
            warn:           'var(--c-warn)',
            danger:         'var(--c-danger)',
            info:           'var(--c-info)',
          },
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        }
      }
    }
  </script>

  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block footer %}
  <footer style="border-top:1px solid var(--c-border);padding:14px 24px;text-align:center;font-size:11px;color:var(--c-faint);">
    &copy; 2025 Cyvera AI Infrastructure Ltd &middot; Neuro v2.3.1 &middot;
    <a href="/terms" style="color:var(--c-faint);text-decoration:none;">Terms</a> &middot;
    <a href="/privacy" style="color:var(--c-faint);text-decoration:none;">Privacy</a> &middot;
    <a href="/api/v1/health" style="color:var(--c-faint);text-decoration:none;">Status</a>
  </footer>
  {% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
