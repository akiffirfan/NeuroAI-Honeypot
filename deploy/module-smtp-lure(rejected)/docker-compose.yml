# Module 8 — SMTP lure (minimal asyncio ESMTP listener)
# Captures: MAIL FROM/RCPT TO/DATA bodies, VRFY/EXPN enumeration, AUTH attempts.
# DNAT: host port 25 → OpenCanary was already mapped; this container replaces OpenCanary
#       for SMTP. OpenCanary's smtp.enabled must be set to false to avoid port conflict.
# Run from /opt/honeypot/deploy/module-8-smtp-lure/

networks:
  honeypot-net:
    external: true
    name: honeypot-net

  data-net:
    external: true
    name: data-net

services:

  smtp-lure:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smtp-lure
    restart: on-failure:5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE     # required to bind port 25 as non-root
    networks:
      honeypot-net:
        ipv4_address: 10.10.20.5   # between opencanary (.6) and mariadb (.4)
      data-net: {}
    environment:
      - POSTGRES_DSN=postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SENSOR_NAME=neuro-smtp-01
      - SMTP_BIND_HOST=0.0.0.0
      - SMTP_BIND_PORT=25
      - SMTP_BANNER=220 mail.neuro.ai ESMTP Postfix (Ubuntu/Focal)
    env_file:
      - .env
    mem_limit: 64m
    memswap_limit: 64m
    cpus: "0.1"
    pids_limit: 20
