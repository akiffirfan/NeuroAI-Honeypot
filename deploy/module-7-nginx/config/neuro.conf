# neuro.conf — OpenResty nginx configuration for the Neuro honeypot platform
# Mounted read-only at: /usr/local/openresty/nginx/conf/conf.d/neuro.conf
#
# OPERATOR: Before deploying this file, complete ONE edit:
#   1. Certbot email in the cert issuance command (see docker-compose.yml prerequisites).
# HoneyDash dashboard is hosted externally — no dash subdomain block needed.
#
# This file requires the OpenResty image (openresty/openresty:alpine).
# It uses more_set_headers from the ngx_headers_more module — not available in stock nginx.
#
# ARCHITECTURE NOTE — why ALL traffic proxies to honeypot-api:
#   Module 6 (honeypot-api) is a server-rendered FastAPI application using Jinja2 templates.
#   There are no static files served directly by nginx — every route (/, /dashboard,
#   /api/*, /admin, /.env, /robots.txt, etc.) is handled by FastAPI. nginx's role is
#   pure TLS termination and reverse proxy. There is no `root` or `try_files` directive.

# ---------------------------------------------------------------------------
# Rate limiting zone — 30 requests/min per IP
# ---------------------------------------------------------------------------
# 10m shared memory holds ~160,000 unique IPs (each binary_remote_addr entry = 7 bytes).
# 30r/m ≈ 1 request every 2 seconds — consistent with legitimate human users.
# burst=60 allows a burst of 60 extra requests queued before nodelay rejection.
# This rate is a deception-aware choice: real production apps rate-limit; honeypots that
# don't look immediately suspicious to automated scanners that probe rate-limit behaviour.
limit_req_zone $binary_remote_addr zone=neuro_limit:10m rate=30r/m;

# ---------------------------------------------------------------------------
# Fingerprinting-aware access log format (http context — must be outside server blocks)
# ---------------------------------------------------------------------------
# Captures fields that reveal attacker tool fingerprints:
#   - User-Agent: identifies scanner tools (Masscan, Nuclei, Shodan, custom bots)
#   - Referer: reveals pivot paths and referral chains
#   - X-Forwarded-For: exposes proxy chains and VPN exit nodes
#   - Accept-Language: geographic profiling of interactive operators
log_format honeypot '$remote_addr [$time_local] "$request" $status '
                    '"$http_user_agent" "$http_referer" '
                    'xff="$http_x_forwarded_for" '
                    'lang="$http_accept_language"';

# ---------------------------------------------------------------------------
# HTTP server — ACME challenge + redirect to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name neurodata.me;

    # ACME challenge webroot — certbot writes here during cert issuance and renewal.
    # This location MUST NOT redirect to HTTPS — Let's Encrypt follows it over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Docker healthcheck target — wget inside the OpenResty alpine container has no SSL
    # support and cannot follow the 301 redirect to https://. Serve /health directly on
    # port 80 so the healthcheck never needs to touch TLS.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # All other HTTP traffic → permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# neurodata.me — main honeypot frontend
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name neurodata.me;

    ssl_certificate     /etc/letsencrypt/live/neurodata.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neurodata.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -------------------------------------------------------------------------
    # Deceptive response headers
    # -------------------------------------------------------------------------
    # `always` keyword is REQUIRED on all add_header directives.
    # Without `always`, nginx only emits headers on 2xx/3xx responses.
    # On 4xx/5xx (e.g., 502 from a restarting honeypot-api), headers would be
    # absent — the inconsistency between healthy and error responses is itself
    # a honeypot fingerprint tell.
    add_header X-Powered-By "FastAPI/0.104.1" always;
    add_header X-Debug-Mode "enabled" always;
    add_header X-Neuro-Version "2.3.1" always;

    # Server header override — requires ngx_headers_more (openresty image only).
    # `add_header Server` is silently ignored by nginx — the Server header is set
    # by nginx core and cannot be overridden with the standard add_header directive.
    # more_set_headers replaces it on ALL response codes (2xx through 5xx).
    more_set_headers "Server: uvicorn/0.24.0";

    # Deliberately OMIT security headers:
    #   - No Content-Security-Policy
    #   - No X-Frame-Options
    #   - No X-Content-Type-Options
    #   - No Strict-Transport-Security (short HSTS max-age acceptable after go-live)
    # Intentional misconfiguration: a real rushed internal tool would skip these.
    # This increases attacker confidence that the target is a carelessly exposed system.

    # -------------------------------------------------------------------------
    # Access log — uses the honeypot format defined above (http context)
    # -------------------------------------------------------------------------
    access_log /usr/local/openresty/nginx/logs/neuro_access.log honeypot;

    # -------------------------------------------------------------------------
    # Health endpoint — Docker healthcheck target
    # -------------------------------------------------------------------------
    # Exact-match location. Not rate-limited. Not proxied to honeypot-api.
    # Not logged (access_log off prevents noisy healthcheck entries in neuro_access.log).
    # The Docker healthcheck hits this every 30s — excluding it from logs prevents
    # log pollution and keeps the access log clean for threat intelligence analysis.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # All traffic → honeypot-api:8080
    # -------------------------------------------------------------------------
    # FastAPI (Module 6) handles ALL routes: /, /api/*, /admin, /.env, /robots.txt,
    # /sitemap.xml, /api/docs (Swagger), /debug/logs, etc.
    # There are no static files served by nginx directly — the Jinja2 server-rendered
    # architecture means every request requires FastAPI processing for event capture.
    location / {
        limit_req zone=neuro_limit burst=60 nodelay;
        # burst=60: allows a burst of up to 60 excess requests queued before rejection.
        # nodelay: queued burst requests are served immediately, not delayed; 429 is
        # returned only when the burst queue is full. This prevents slow-response
        # tells from rate-limiting that would flag the honeypot to scanner heuristics.

        proxy_pass http://honeypot-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # proxy_connect_timeout 5s: if honeypot-api is down, nginx returns 502 quickly
        # rather than hanging. The deceptive headers (above) are still emitted on 502
        # because of the `always` keyword — attackers see uvicorn Server header even
        # on error responses.
    }
}

# dash subdomain removed — HoneyDash is hosted externally on collaborator's domain.
