# neuro.conf — OpenResty nginx configuration for the Neuro honeypot platform
# Mounted read-only at: /usr/local/openresty/nginx/conf/conf.d/neuro.conf
#
# OPERATOR: Before deploying this file, complete ONE edit:
#   1. Certbot email in the cert issuance command (see docker-compose.yml prerequisites).
# HoneyDash dashboard is hosted externally — no dash subdomain block needed.
#
# This file requires the OpenResty image (openresty/openresty:alpine).
# It uses more_set_headers from the ngx_headers_more module — not available in stock nginx.
#
# ARCHITECTURE NOTE — why ALL traffic proxies to honeypot-api:
#   Module 6 (honeypot-api) is a server-rendered FastAPI application using Jinja2 templates.
#   There are no static files served directly by nginx — every route (/, /dashboard,
#   /api/*, /admin, /.env, /robots.txt, etc.) is handled by FastAPI. nginx's role is
#   pure TLS termination and reverse proxy. There is no `root` or `try_files` directive.

# ---------------------------------------------------------------------------
# Rate limiting zone — 30 requests/min per IP
# ---------------------------------------------------------------------------
# 10m shared memory holds ~160,000 unique IPs (each binary_remote_addr entry = 7 bytes).
# 30r/m ≈ 1 request every 2 seconds — consistent with legitimate human users.
# burst=60 allows a burst of 60 extra requests queued before nodelay rejection.
# This rate is a deception-aware choice: real production apps rate-limit; honeypots that
# don't look immediately suspicious to automated scanners that probe rate-limit behaviour.
limit_req_zone $binary_remote_addr zone=neuro_limit:10m rate=30r/m;

# ---------------------------------------------------------------------------
# Fingerprinting-aware access log format (http context — must be outside server blocks)
# ---------------------------------------------------------------------------
# Captures fields that reveal attacker tool fingerprints:
#   - User-Agent: identifies scanner tools (Masscan, Nuclei, Shodan, custom bots)
#   - Referer: reveals pivot paths and referral chains
#   - X-Forwarded-For: exposes proxy chains and VPN exit nodes
#   - Accept-Language: geographic profiling of interactive operators
log_format honeypot '$remote_addr [$time_local] "$request" $status '
                    '"$http_user_agent" "$http_referer" '
                    'xff="$http_x_forwarded_for" '
                    'lang="$http_accept_language"';

# ---------------------------------------------------------------------------
# neuro.cyveera.com — HTTP-only on port 8081
# (80/443 are owned by the existing nginx stack on this shared VPS)
# ---------------------------------------------------------------------------
server {
    listen 8081;
    server_name neuro.cyveera.com _;

    # -------------------------------------------------------------------------
    # Deceptive response headers
    # -------------------------------------------------------------------------
    add_header X-Powered-By "FastAPI/0.104.1" always;
    add_header X-Debug-Mode "enabled" always;
    add_header X-Neuro-Version "2.3.1" always;
    more_set_headers "Server: uvicorn/0.24.0";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;

    # -------------------------------------------------------------------------
    # Access log
    # -------------------------------------------------------------------------
    access_log /usr/local/openresty/nginx/logs/neuro_access.log honeypot;

    # -------------------------------------------------------------------------
    # Health endpoint — Docker healthcheck target
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # Jupyter Lab stub — /jupyter/ → honeypot-api:8888
    # Exposes fake Jupyter as an additional high-value lure for ML infra attackers.
    # WebSocket headers required for kernel channel connections.
    # -------------------------------------------------------------------------
    location = /jupyter {
        return 301 /jupyter/;
    }

    location /jupyter/ {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot-api:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # All traffic → honeypot-api:8080
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=neuro_limit burst=60 nodelay;

        proxy_pass http://honeypot-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
