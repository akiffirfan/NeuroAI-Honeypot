# neuro.conf — OpenResty nginx for Neuro by Cyveera
# Mounted read-only at: /etc/nginx/conf.d/neuro.conf
#
# Architecture:
#   - /api/*           → proxy to FastAPI (honeypot-api:8080)
#   - Lure paths       → proxy to FastAPI (/.git/config, /.env, /config.yaml, etc.)
#   - /jupyter/        → proxy to Jupyter stub (honeypot-api:8888)
#   - /assets/*        → nginx static from SPA dist (immutable, 1y cache)
#   - everything else  → SPA index.html (client-side routing)
#
# SPA dist is bind-mounted at /usr/local/openresty/nginx/html/neuro-spa (read-only).
# Host path: /srv/neuro-spa/dist
#
# This file uses more_set_headers from ngx_headers_more (OpenResty only).

# ---------------------------------------------------------------------------
# Rate limiting — 30r/m per IP
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=neuro_limit:10m rate=30r/m;

# ---------------------------------------------------------------------------
# Access log format (http context)
# ---------------------------------------------------------------------------
log_format honeypot '$remote_addr [$time_local] "$request" $status '
                    '"$http_user_agent" "$http_referer" '
                    'xff="$http_x_forwarded_for" '
                    'lang="$http_accept_language"';

# ---------------------------------------------------------------------------
# Upstream definition for FastAPI backend
# ---------------------------------------------------------------------------
upstream honeypot_api {
    server honeypot-api:8080;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# neuro.cyveera.com — HTTP-only on port 8081
# (80/443 are owned by the existing nginx stack on this shared VPS)
# ---------------------------------------------------------------------------
server {
    listen 8081;
    server_name neuro.cyveera.com _;

    # -------------------------------------------------------------------------
    # Deceptive + security response headers
    # -------------------------------------------------------------------------
    add_header X-Powered-By "FastAPI/0.104.1" always;
    add_header X-Neuro-Version "2.3.1" always;
    more_set_headers "Server: uvicorn/0.24.0";

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # -------------------------------------------------------------------------
    # Access log
    # -------------------------------------------------------------------------
    access_log /usr/local/openresty/nginx/logs/neuro_access.log honeypot;

    # -------------------------------------------------------------------------
    # Health endpoint — Docker healthcheck target
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # Lure: git config discovery — exact match only
    # Attackers who probe /.git/config find credentials → login kill chain
    # -------------------------------------------------------------------------
    location = /.git/config {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /.git/HEAD {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Block the rest of the .git tree — prevents SPA from returning 200+HTML for git paths
    location /.git/ {
        return 404;
    }

    # -------------------------------------------------------------------------
    # Lure: other common deploy-slip paths
    # -------------------------------------------------------------------------
    location = /.env {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /config.yaml {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /robots.txt {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /sitemap.xml {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /metrics {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /.well-known/ {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # Jupyter Lab stub — /jupyter/ → honeypot-api:8888
    # -------------------------------------------------------------------------
    location = /jupyter {
        return 301 /jupyter/;
    }

    location /jupyter/ {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot-api:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # API — all /api/* goes to FastAPI
    # Includes /api/v1/ (lure routes) and /api/v2/ (React SPA backend)
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=neuro_limit burst=60 nodelay;
        proxy_pass http://honeypot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # SPA static assets — immutable, served directly by nginx
    # Vite puts all JS/CSS/fonts at /assets/ with content-hash filenames.
    # Root: /usr/local/openresty/nginx/html/neuro-spa (= /srv/neuro-spa/dist on host)
    # -------------------------------------------------------------------------
    location /assets/ {
        root /usr/local/openresty/nginx/html/neuro-spa;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico {
        root /usr/local/openresty/nginx/html/neuro-spa;
        try_files $uri =404;
        access_log off;
        expires 1d;
    }

    # -------------------------------------------------------------------------
    # SPA catch-all — every other path returns index.html
    # TanStack Router handles client-side routing from there.
    # -------------------------------------------------------------------------
    location / {
        root /usr/local/openresty/nginx/html/neuro-spa;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
