# neuro-http-only.conf — Temporary HTTP-only nginx config for initial cert issuance
# Mounted read-only at: /usr/local/openresty/nginx/conf/conf.d/neuro.conf
#
# PURPOSE:
#   nginx/OpenResty will fail to start if ssl_certificate paths do not exist.
#   This config is used ONLY during Phase 1 of deployment — before the Let's Encrypt
#   certificate has been issued by certbot. It serves port 80 only, with no TLS block.
#
# USAGE SEQUENCE:
#   1. Copy this file to /opt/honeypot/config/nginx/neuro.conf
#   2. docker compose up -d   (nginx starts successfully without a cert)
#   3. Open ports 80 and 443 at the DigitalOcean cloud firewall panel
#   4. Run the certbot one-off container to issue the certificate (see docker-compose.yml)
#   5. Copy the full neuro.conf over this file
#   6. docker exec nginx openresty -s reload
#   7. Verify: curl -sk https://neurodata.me/health  →  ok
#   8. Run: bash verify-module-7.sh
#
# DO NOT leave this file active in production — it does not enforce HTTPS, does not
# apply rate limiting, and does not serve the deceptive honeypot headers.

server {
    listen 80;
    server_name neurodata.me;

    # ACME challenge webroot — must be served over HTTP for certbot webroot validation.
    # certbot writes the challenge file here; Let's Encrypt fetches it over port 80.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Placeholder response — operator sees this when verifying nginx is up before cert issuance.
    # Attackers who hit port 80 during this brief setup window will see a benign message.
    # This window should be kept as short as possible (minutes, not hours).
    location / {
        return 200 "Neuro — cert provisioning in progress\n";
        add_header Content-Type text/plain;
    }
}
